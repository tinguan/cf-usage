services:
  cf-spend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cf-spend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - cf_spend_data:/data
    environment:
      # ── Cloudflare credentials ──────────────────────────────────────────────
      CF_API_TOKEN: ${CF_API_TOKEN}
      CF_ACCOUNT_ID: ${CF_ACCOUNT_ID}

      # ── Dashboard auth (set these — read from Cloudflare/Docker env vars) ──
      CF_DASHBOARD_USER: ${CF_DASHBOARD_USER:-admin}
      CF_DASHBOARD_PASS: ${CF_DASHBOARD_PASS}

      # ── Session secret (32+ chars) ──────────────────────────────────────────
      SESSION_SECRET: ${SESSION_SECRET}

      # ── Optional Slack webhook ──────────────────────────────────────────────
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}

      # ── DB (mounted volume) ─────────────────────────────────────────────────
      DB_PATH: /data/cf_spend.db

      NODE_ENV: production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  cf_spend_data:
    driver: local
